<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GD Deco AI Pro(Made with AI)</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1d1d1d);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #222;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
}

h1 {
    color: cyan;
    margin-bottom: 10px;
}

.subtitle {
    color: #aaa;
    margin-bottom: 25px;
}

.upload-box {
    border: 3px dashed cyan;
    padding: 40px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input[type=file] {
    margin-top: 15px;
}

button {
    background: cyan;
    color: black;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

#progressContainer {
    display: none;
    margin-top: 25px;
}

.progress-bar {
    width: 100%;
    height: 30px;
    background: #333;
    border-radius: 15px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: lime;
    transition: width 0.1s linear;
}

#status {
    margin-top: 15px;
    font-size: 20px;
}

#downloadBtn {
    display: none;
    margin-top: 25px;
    background: lime;
}
</style>
</head>
<body>

<div class="container">
    <h1>GD Deco AI Pro™</h1>
    <p class="subtitle">
        Instantly transform your Geometry Dash level into a legendary featured masterpiece using advanced AI decoration technology.
    </p>

    <div class="upload-box">
        <p>Select or drag a .gmd file</p>
        <input type="file" id="fileInput" accept=".gmd">
    </div>

    <button onclick="startProcess()">Generate Amazing Deco</button>

    <div id="progressContainer">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="status">Waiting...</div>
    </div>

    <button id="downloadBtn">
        Download Decorated Version File
    </button>
</div>

<script>
function startProcess() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a .gmd file first.");
        return;
    }

    document.getElementById("progressContainer").style.display = "block";

    const stages = [
        "Selecting objects",
        "Picking fitting deco",
        "Applying deco",
        "Finishing"
    ];

    let stageIndex = 0;
    let progress = 0;

    const progressFill = document.getElementById("progressFill");
    const status = document.getElementById("status");

    status.textContent = stages[0] + " (0%)";

    const interval = setInterval(() => {

        progress += Math.floor(Math.random() * 4) + 1;

        if (progress > 100)
            progress = 100;

        progressFill.style.width = progress + "%";
        status.textContent = stages[stageIndex] + " (" + progress + "%)";

        if (progress >= 100) {
            stageIndex++;

            if (stageIndex >= stages.length) {
                clearInterval(interval);

                status.textContent = "Finished!";

                const btn = document.getElementById("downloadBtn");
                btn.style.display = "inline-block";

                btn.onclick = () => {
                    window.open(
                        "https://youtu.be/dQw4w9WgXcQ?si=0XpVT39jE-hfY_qL",
                        "_blank"
                    );
                };

                return;
            }

            progress = 0;
            progressFill.style.width = "0%";
            status.textContent = stages[stageIndex] + " (0%)";
        }

    }, 50);
}
</script>

</body>
</html>
